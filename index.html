<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sexify Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
    
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
      const firebaseConfig = { apiKey: "YOUR_API_KEY", authDomain: "YOUR_PROJECT.firebaseapp.com", projectId: "YOUR_PROJECT_ID", storageBucket: "YOUR_PROJECT.appspot.com", messagingSenderId: "YOUR_SENDER_ID", appId: "YOUR_APP_ID" };
      const app = initializeApp(firebaseConfig);
      const storage = getStorage(app);
      window.firebaseStorage = { storage, ref, uploadBytesResumable, getDownloadURL };
    </script>

    <style>
        ::-webkit-scrollbar { display: none; }
        body { -webkit-tap-highlight-color: transparent; user-select: none; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: #fcfcfc; }
        :root { --sexify-main: #e11d48; }
        .text-sexify { color: var(--sexify-main); }
        .bg-sexify { background-color: var(--sexify-main); }
        .border-sexify { border-color: var(--sexify-main); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .glass-header { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        .category-chip.active { background-color: var(--sexify-main); color: white; border-color: var(--sexify-main); }
    </style>
</head>
<body class="text-gray-900 overflow-x-hidden">

    <div id="age-gate" class="fixed inset-0 z-[100] flex items-center justify-center bg-black transition-opacity duration-500">
        <div class="bg-white p-8 rounded-3xl max-w-sm w-11/12 text-center shadow-2xl">
            <h2 class="text-3xl font-black mb-2 text-sexify tracking-tighter">SEXIFY</h2>
            <p class="text-gray-500 mb-8 text-sm">進入即代表您已滿 18 歲。</p>
            <button onclick="verifyAge()" class="w-full bg-sexify text-white font-bold py-4 rounded-2xl mb-4 shadow-lg active:scale-95 transition">進入專屬空間</button>
        </div>
    </div>

    <div id="app-content" class="filter blur-2xl transition-all duration-500 pointer-events-none">
        <header class="sticky top-0 glass-header border-b z-40 px-5 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-black tracking-tighter text-sexify">SEX<span class="text-black">IFY</span></h1>
            <div class="flex space-x-5"><i class="fa-regular fa-comment-dots text-xl text-gray-700"></i><i class="fa-regular fa-bell text-xl text-gray-700"></i></div>
        </header>

        <main class="pb-32">
            <section id="home-tab" class="tab-content active">
                <div class="flex space-x-4 overflow-x-auto p-4 no-scrollbar">
                    <div class="flex-shrink-0 w-16 h-16 rounded-full ring-2 ring-red-500 p-0.5"><div class="w-full h-full bg-gradient-to-tr from-orange-400 to-red-600 rounded-full border-2 border-white"></div></div>
                    <div class="flex-shrink-0 w-16 h-16 rounded-full ring-2 ring-gray-200 p-0.5"><div class="w-full h-full bg-gray-200 rounded-full border-2 border-white"></div></div>
                </div>
                <div class="bg-white border-y mt-2">
                    <div class="p-4 flex items-center justify-between">
                        <div class="flex items-center space-x-3">
                            <div class="w-10 h-10 bg-gradient-to-br from-red-400 to-purple-600 rounded-full"></div>
                            <div><span class="font-bold text-sm">Hot_Creator_99</span></div>
                        </div>
                    </div>
                    <div class="relative aspect-[4/5] bg-gray-100">
                        <img id="post-img" src="https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=1000" class="w-full h-full object-cover blur-3xl transition-all">
                        <div id="post-lock" class="absolute inset-0 flex flex-col items-center justify-center bg-black/40 text-white backdrop-blur-md">
                            <button onclick="showPay()" class="bg-sexify px-10 py-4 rounded-full font-bold text-sm">訂閱以查看 $9.99/月</button>
                        </div>
                    </div>
                </div>
            </section>

            <section id="shop-tab" class="tab-content px-5 pt-4">
                <h2 class="text-3xl font-black mb-6">SEXIFY 商店</h2>
                <div class="grid grid-cols-2 gap-4" id="dynamic-shop-grid"></div>
            </section>

            <section id="upload-tab" class="tab-content px-6 pt-4">
                <h2 class="text-2xl font-black mb-6">發佈內容</h2>
                <div id="drop-area" class="border-2 border-dashed border-red-200 rounded-[2rem] p-10 text-center bg-red-50/30" onclick="document.getElementById('file-input').click()">
                    <i class="fa-solid fa-cloud-arrow-up text-4xl text-sexify mb-4"></i>
                    <p class="text-sm font-bold">選擇照片</p>
                    <input type="file" id="file-input" class="hidden" accept="image/*" onchange="handleFileSelect(this)">
                </div>
                <div id="preview-container" class="hidden mt-4 relative rounded-2xl overflow-hidden">
                    <img id="file-preview" class="w-full h-64 object-cover">
                    <div id="upload-overlay" class="absolute inset-0 bg-black/60 hidden flex items-center justify-center text-white">
                        <p>上傳中... <span id="progress-percent">0%</span></p>
                    </div>
                </div>
                <button onclick="startUpload()" class="w-full bg-sexify text-white font-bold py-5 rounded-2xl mt-6">上傳至雲端</button>
            </section>

            <section id="profile-tab" class="tab-content">
                <div class="bg-white px-6 pt-10 pb-6 border-b">
                    <div class="flex justify-between items-start mb-6">
                        <div class="w-24 h-24 bg-gradient-to-tr from-red-600 to-rose-400 rounded-3xl p-1 shadow-lg">
                            <div class="w-full h-full bg-white rounded-2xl overflow-hidden flex items-center justify-center">
                                <img src="https://i.pravatar.cc/150?u=me" class="w-full h-full object-cover">
                            </div>
                        </div>
                        <div class="flex space-x-2">
                            <button class="bg-gray-100 px-4 py-2 rounded-xl text-xs font-bold">編輯資料</button>
                            <button class="bg-black text-white px-4 py-2 rounded-xl text-xs font-bold"><i class="fa-solid fa-share"></i></button>
                        </div>
                    </div>
                    <h3 class="text-2xl font-black">Creator_Master</h3>
                    <p class="text-xs text-gray-500 mb-4">✨ 這裡是我的私密生活分享</p>
                    <div class="flex space-x-8 text-center border-t pt-4">
                        <div><p class="font-black text-lg">12</p><p class="text-[10px] text-gray-400 uppercase">貼文</p></div>
                        <div><p class="font-black text-lg">5.2K</p><p class="text-[10px] text-gray-400 uppercase">粉絲</p></div>
                    </div>
                </div>

                <div class="sticky top-[64px] bg-white z-30 flex border-b">
                    <button onclick="toggleProfileView('my-posts')" id="btn-my-posts" class="flex-1 py-4 text-sm font-bold border-b-2 border-sexify text-sexify">我的發佈</button>
                    <button onclick="toggleProfileView('my-stats')" id="btn-my-stats" class="flex-1 py-4 text-sm font-bold text-gray-400">數據分析</button>
                </div>

                <div id="view-my-posts" class="p-1 grid grid-cols-3 gap-0.5">
                    <div class="aspect-square bg-gray-50 flex items-center justify-center text-gray-300 border-2 border-dashed rounded-lg m-1 cursor-pointer" onclick="switchTab('upload-tab')">
                        <i class="fa-solid fa-plus text-xl"></i>
                    </div>
                </div>

                <div id="view-my-stats" class="hidden p-5 space-y-4">
                    <div class="bg-black p-6 rounded-[2rem] text-white">
                        <p class="text-[10px] opacity-60 uppercase font-bold tracking-widest">累積收益</p>
                        <p class="text-sm opacity-40 line-through mt-2">$120.00</p> 
                        <p class="text-4xl font-black text-sexify">$2,450.00</p>
                    </div>
                </div>
            </section>
        </main>

        <footer class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-lg border-t z-50">
            <div class="flex justify-around items-center h-16">
                <button onclick="switchTab('home-tab')" class="nav-btn text-sexify"><i class="fa-solid fa-house text-xl"></i></button>
                <button onclick="switchTab('shop-tab')" class="nav-btn text-gray-300"><i class="fa-solid fa-store text-xl"></i></button>
                <button onclick="switchTab('upload-tab')" class="nav-btn text-gray-300"><div class="w-12 h-12 bg-sexify text-white rounded-full flex items-center justify-center -mt-8 shadow-lg"><i class="fa-solid fa-plus text-xl"></i></div></button>
                <button onclick="switchTab('profile-tab')" class="nav-btn text-gray-300"><i class="fa-solid fa-user text-xl"></i></button>
            </div>
        </footer>
    </div>

    <script>
        let selectedFile = null;
        const products = [
            { name: "私人訂製影片", price: 99.0, oldPrice: 150.0, img: "https://picsum.photos/400/400?random=1" },
            { name: "簽名拍立得", price: 45.0, oldPrice: 60.0, img: "https://picsum.photos/400/400?random=2" }
        ];

        function renderShop() {
            document.getElementById('dynamic-shop-grid').innerHTML = products.map(p => `
                <div class="bg-white rounded-3xl overflow-hidden border shadow-sm">
                    <img src="${p.img}" class="w-full aspect-square object-cover">
                    <div class="p-4">
                        <h4 class="font-bold text-xs">${p.name}</h4>
                        <div class="flex items-center gap-2">
                            <p class="text-sexify font-black">$${p.price}</p>
                            <p class="text-[10px] text-gray-400 line-through">$${p.oldPrice}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function verifyAge() {
            document.getElementById('age-gate').classList.add('opacity-0');
            setTimeout(() => {
                document.getElementById('age-gate').style.display = 'none';
                document.getElementById('app-content').classList.remove('blur-2xl', 'pointer-events-none');
                renderShop();
            }, 500);
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => {
                b.classList.remove('text-sexify');
                b.classList.add('text-gray-300');
            });
            event.currentTarget.classList.add('text-sexify');
        }

        function toggleProfileView(view) {
            const isPosts = view === 'my-posts';
            document.getElementById('view-my-posts').classList.toggle('hidden', !isPosts);
            document.getElementById('view-my-stats').classList.toggle('hidden', isPosts);
            document.getElementById('btn-my-posts').className = isPosts ? "flex-1 py-4 text-sm font-bold border-b-2 border-sexify text-sexify" : "flex-1 py-4 text-sm font-bold text-gray-400";
            document.getElementById('btn-my-stats').className = !isPosts ? "flex-1 py-4 text-sm font-bold border-b-2 border-sexify text-sexify" : "flex-1 py-4 text-sm font-bold text-gray-400";
        }

        function handleFileSelect(i) {
            selectedFile = i.files[0];
            const r = new FileReader();
            r.onload = e => { 
                document.getElementById('file-preview').src = e.target.result;
                document.getElementById('preview-container').classList.remove('hidden');
            };
            r.readAsDataURL(selectedFile);
        }

        async function startUpload() {
            if (!selectedFile) return alert("請選擇檔案");
            const { storage, ref, uploadBytesResumable, getDownloadURL } = window.firebaseStorage;
            const sRef = ref(storage, 'uploads/' + Date.now() + selectedFile.name);
            const task = uploadBytesResumable(sRef, selectedFile);
            document.getElementById('upload-overlay').classList.remove('hidden');

            task.on('state_changed', 
                s => { document.getElementById('progress-percent').innerText = Math.round((s.bytesTransferred / s.totalBytes) * 100) + '%'; },
                e => alert(e.message),
                async () => {
                    const url = await getDownloadURL(task.snapshot.ref);
                    const div = document.createElement('div');
                    div.className = "aspect-square overflow-hidden rounded-lg";
                    div.innerHTML = `<img src="${url}" class="w-full h-full object-cover">`;
                    document.getElementById('view-my-posts').prepend(div);
                    alert("上傳成功");
                    switchTab('profile-tab');
                }
            );
        }

        function showPay() {
            if(confirm("確認支付訂閱？")) {
                document.getElementById('post-img').classList.remove('blur-3xl');
                document.getElementById('post-lock').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
